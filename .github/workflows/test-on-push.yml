name: Run tests and linting on push

on:
  push:
    branches-ignore:
      - main
      - 'release/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  tests:
    uses: ./.github/workflows/reusable-tests.yml
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
